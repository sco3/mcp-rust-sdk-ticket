name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Compare Network Stack (Linux vs macOS)
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            echo "--- LINUX (Ubuntu) TCP AUDIT ---"
            # Global flags
            sysctl net.ipv4.tcp_low_latency || echo "tcp_low_latency not in this kernel"
            sysctl net.ipv4.tcp_autocorking
            
            # Check for "Quick ACK" support
            echo "Nagle-related metrics (from snmp):"
            grep -E "TcpExt|DelayedACKs" /proc/net/netstat | cut -c1-100
          
          elif [ "$RUNNER_OS" == "macOS" ]; then
            echo "--- MACOS (ARM) TCP AUDIT ---"
            sysctl net.inet.tcp.delayed_ack
            sysctl net.inet.tcp.nodelay        # This is the global Nagle toggle for Mac!
          fi

      - name: Clone rmcp rust-sdk for test server
        # Pinned to rmcp-v1.3.0 for reproducible benchmarks
        run: git clone --branch rmcp-v1.3.0 --depth 1 https://github.com/modelcontextprotocol/rust-sdk.git /tmp/rust-sdk

      - name: Build MCP test server
        working-directory: /tmp/rust-sdk
        run: cargo build -p mcp-server-examples --example servers_counter_streamhttp --release

      - name: Build Rust benchmark client
        run: cargo build --release

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Start MCP test server
        run: |
          /tmp/rust-sdk/target/release/examples/servers_counter_streamhttp &
          echo $! > /tmp/mcp_server.pid
          sleep 2

      - name: Run Rust benchmark (default mode)
        run: |
          echo "=== Rust Benchmark (Default Mode) ==="
          cargo run --release

      - name: Run Rust benchmark (custom mode)
        run: |
          echo "=== Rust Benchmark (Custom Mode - pool_max_idle_per_host(0)) ==="
          cargo run --release -- custom

      - name: Run Python latency test
        run: |
          echo "=== Python Latency Test ==="
          uv run latency_test.py http://localhost:8000/mcp say_hello

      - name: Stop MCP test server
        if: always()
        run: kill $(cat /tmp/mcp_server.pid) 2>/dev/null || true
